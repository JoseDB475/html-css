<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="styles.css">


</head>

<body>
    <h1>VENTANA MODAL</h1>

    <BUtton command="show-modal" commandfor="modal">CLICK AQUI</BUtton>

    <dialog id="modal">
        <h2>VENTANA MODAL</h2>
        <P>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Eum facere magnam cupiditate! Non unde quidem
            cupiditate reprehenderit repellendus autem nesciunt accusantium, labore voluptatem iusto ullam, ut
            perferendis aspernatur temporibus dolor.</P>
    </dialog>

    <!-- este es codigo de java script para quie se cierre la ventana modal al darle click por fuera de la ventana -->
    <script>
        let modal = document.getElementById('modal')
        modal.addEventListener('click', (e) =>{
            if(e.target === modal) modal.close()
        })
    </script>

</body>

</html>
